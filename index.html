<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>聚合终端 - 控制中心</title>
  <style>
    :root { --c: #00ff41; --b: #0a0a0a; }
    * { -webkit-tap-highlight-color: transparent!important; outline: none!important; box-sizing: border-box; }
    body { background: var(--b); color: var(--c); font-family: 'Courier New', monospace; margin: 0; padding-top: 20px; padding-bottom: 60px; font-size: 12px; }
    body::after { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.02) 2px,rgba(0,255,65,0.02) 4px); pointer-events:none; z-index:998; }
    .container { padding: 20px; max-width: 800px; margin: 0 auto; position: relative; z-index: 10; }
    #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--b); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    #login-screen input { width: 300px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,65,0.3); color: var(--c); padding: 15px; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
    #login-screen button { width: 300px; background: transparent; color: var(--c); border: 1px solid var(--c); padding: 15px; cursor: pointer; letter-spacing: 4px; }
    #login-screen button:hover { background: rgba(0,255,65,0.2); }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #000; border-top: 1px solid rgba(0,255,65,0.3); display: flex; align-items: center; z-index: 1000; }
    .ni { flex: 1; text-align: center; cursor: pointer; opacity: 0.6; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(0,255,65,0.3); }
    .ni:last-child { border-right: none; }
    .ni.active { opacity: 1; font-weight: bold; background: rgba(0,255,65,0.1); }
    input, textarea, select { width: 100%; background: #000; border: 1px solid var(--c); color: var(--c); padding: 8px; margin-bottom: 10px; font-family: monospace; }
    textarea.add-api { height: 100px; resize: vertical; }
    .btn { border: 1px solid var(--c); padding: 8px 15px; color: var(--c); background: none; cursor: pointer; display: inline-block; transition: 0.2s; }
    .btn:hover { background: rgba(0,255,65,0.2); }
    .btn-main { background: rgba(0,255,65,0.1); font-weight: bold; }
    details { border: 1px solid var(--c); margin-bottom: 10px; background: rgba(0,255,65,0.02); }
    summary { padding: 10px; cursor: pointer; border-bottom: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
    details[open] summary { border-bottom: 1px solid var(--c); margin-bottom: 10px; }
    .group-body { padding: 0 10px 10px 10px; }
    .del-btn { color: rgba(0,255,65,0.5); cursor: pointer; }
    .del-btn:hover { color: #ff4444; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: var(--c); border: 1px solid var(--c); padding: 10px 20px; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; }
    .copy-box { border: 1px dashed var(--c); padding: 10px; margin-bottom: 15px; cursor: pointer; word-break: break-all; background: rgba(0,255,65,0.02); }
    .fab-br { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .url-row { display: flex; align-items: center; margin-bottom: 5px; gap: 5px; }
    .url-row input { margin: 0; flex: 1; }
    .tk-tag { display: inline-flex; align-items: center; background: rgba(0,255,65,0.1); border: 1px solid var(--c); padding: 4px 8px; margin: 0 5px 5px 0; }
    .tk-del { cursor: pointer; margin-left: 8px; color: rgba(0,255,65,0.5); }
    .tk-del:hover { color: #ff4444; }
    .ui-ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10001; }
    .ui-bx { background: #0a0a0a; border: 1px solid var(--c); padding: 20px; width: 300px; }
  </style>
</head>
<body>
  <canvas id="cvs" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.4;pointer-events:none;"></canvas>
  <div id="toast" class="toast"></div>

  <div id="u-ov" class="ui-ov">
    <div class="ui-bx" id="u-bx"></div>
  </div>

  <div id="login-screen">
    <div style="font-size:20px; margin-bottom:30px; letter-spacing: 5px; text-shadow: 0 0 10px rgba(0,255,65,0.5);">[ 核 心 终 端 ]</div>
    <input type="password" id="login-token" placeholder="> 输入 GitHub TOKEN 验证身份 _">
    <button onclick="loginWithToken()">[ 接 入 系 统 ]</button>
  </div>

  <div id="main-app" style="display:none;">
    <div class="container" id="ta">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> API 源节点池</div>
      <div id="group-list"></div>
      <div class="fab-br">
        <button class="btn" onclick="addGroup()">新增分组</button>
        <button class="btn btn-main" onclick="saveToGitHub()">同步并构建</button>
      </div>
    </div>

    <div class="container" id="tc" style="display:none;">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> 订阅文件与模板配置</div>
      <div id="file-config-list" style="margin-bottom:30px;"></div>
      
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> 节点输出模板</div>
      <div id="tpl-list"></div>
      <div class="fab-br">
        <button class="btn" onclick="addTpl()">新增模板</button>
        <button class="btn btn-main" onclick="saveToGitHub()">同步并构建</button>
      </div>
    </div>

    <div class="container" id="tl" style="display:none;">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> 客户端分发链接 (点击复制)</div>
      <div id="api-links"></div>
    </div>

    <nav class="nav">
      <div class="ni active" id="n-a" onclick="switchTab('a')">[ API池 ]</div>
      <div class="ni" id="n-c" onclick="switchTab('c')">[ 模板配置 ]</div>
      <div class="ni" id="n-l" onclick="switchTab('l')">[ 分发链接 ]</div>
    </nav>
  </div>

  <script>
    const c=document.getElementById('cvs'),ctx=c.getContext('2d');
    let w=c.width=window.innerWidth,h=c.height=window.innerHeight,pts=[];
    window.onresize=()=>{w=c.width=window.innerWidth;h=c.height=window.innerHeight;};
    for(let i=0;i<50;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*0.5,vy:(Math.random()-.5)*0.5});
    function d(){
      ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,255,65,0.5)';ctx.strokeStyle='rgba(0,255,65,0.1)';
      for(let i=0;i<pts.length;i++){
        let p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
        ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();
      }
      requestAnimationFrame(d);
    }
    d();

    let config = { global: {}, groups: [], templates: [] };
    let fileSha = '';
    let currentToken = '';

    const tkNameMap = { ip_domain:'IP/域名', original:'原始名称', space:'空格', inc:'递增数字', inc01:'递增(01)' };

    function toast(msg) {
      const el = document.getElementById('toast');
      el.innerText = msg; el.style.opacity = 1;
      setTimeout(() => el.style.opacity = 0, 2500);
    }

    function promptUI(msg, callback) {
      window._uicb = () => {
        const v = document.getElementById('u-inp').value;
        document.getElementById('u-ov').style.display = 'none';
        callback(v);
      };
      document.getElementById('u-bx').innerHTML = `
        <div style="margin-bottom:10px">${msg}</div>
        <input id="u-inp" style="margin-bottom:15px">
        <div style="display:flex;justify-content:flex-end;gap:10px">
          <button class="btn" onclick="document.getElementById('u-ov').style.display='none'">取消</button>
          <button class="btn btn-main" onclick="_uicb()">确定</button>
        </div>
      `;
      document.getElementById('u-ov').style.display = 'flex';
    }

    function getAutoRepo() {
      const host = window.location.hostname;
      const path = window.location.pathname;
      if (host.includes('github.io')) {
        return `${host.split('.')[0]}/${path.split('/')[1] || ''}`.replace(/\/$/, '');
      }
      return null;
    }

    async function loginWithToken() {
      const tokenInput = document.getElementById('login-token').value.trim();
      const repo = getAutoRepo();
      if (!repo) return toast('仅支持在 GitHub Pages 环境下运行');
      if (!tokenInput) return toast('> 错误：凭证不可为空');

      document.getElementById('login-token').value = '正在验证密钥权限...';
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
          headers: { 'Authorization': `token ${tokenInput}` }
        });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        fileSha = data.sha;
        config = JSON.parse(decodeURIComponent(escape(atob(data.content))));
        if(!config.groups) config.groups = [];
        if(!config.templates) config.templates = [];
        if(!config.global) config.global = { filename: 'max', tid: config.templates[0]?.id };
        
        currentToken = tokenInput; 
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        renderGroups();
        renderPathsAndTpls();
        toast('接入成功');
      } catch (e) {
        document.getElementById('login-token').value = '';
        toast('> 错误：密钥无效或无读取权限');
      }
    }

    function switchTab(x) {
      ['a','c','l'].forEach(id => {
        document.getElementById(`t${id}`).style.display = (x===id) ? 'block' : 'none';
        document.getElementById(`n-${id}`).classList.toggle('active', x===id);
      });
      if (x === 'l') renderLinks();
    }

    async function saveToGitHub() {
      flushInputs();
      const repo = getAutoRepo();
      if (!repo || !currentToken || !fileSha) return toast('环境错误，无法构建');
      toast('正在同步并触发云端构建...');
      try {
        const contentStr = JSON.stringify(config, null, 2);
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${currentToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: "Update config via Terminal",
            content: btoa(unescape(encodeURIComponent(contentStr))),
            sha: fileSha
          })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        fileSha = data.content.sha;
        toast('数据已写入！Actions 构建任务已启动');
      } catch (e) {
        toast('同步失败，请检查网络或权限');
      }
    }

    function renderGroups() {
      const html = config.groups.map((g, i) => `
        <details open>
          <summary>
            <span><input value="${g.name}" onchange="config.groups[${i}].name=this.value" style="width:120px; border:none; border-bottom:1px solid var(--c); background:none; padding:2px; margin:0"></span>
            <span class="del-btn" onclick="config.groups.splice(${i},1); renderGroups(); renderPathsAndTpls();">✖ 删除</span>
          </summary>
          <div class="group-body">
            <textarea class="add-api" id="add-api-${i}" placeholder="录入 API 链接或纯节点，按行分割"></textarea>
            ${g.urls.map((u, ui) => `
              <div class="url-row">
                <input value="${u}" onchange="config.groups[${i}].urls[${ui}]=this.value">
                <span class="del-btn" onclick="config.groups[${i}].urls.splice(${ui},1); renderGroups()">✖</span>
              </div>
            `).join('')}
          </div>
        </details>
      `).join('');
      document.getElementById('group-list').innerHTML = html || '<div style="opacity:0.5">尚未配置节点源</div>';
    }

    function addGroup() {
      const newName = '未命名分组';
      config.groups.push({ id: 'g' + Date.now(), name: newName, filename: newName, urls: [], tid: config.templates[0]?.id || '' });
      renderGroups();
      renderPathsAndTpls();
    }

    function flushInputs() {
      config.groups.forEach((g, i) => {
        const el = document.getElementById('add-api-' + i);
        if (el && el.value.trim()) {
          const lines = el.value.split('\n').map(l=>l.trim()).filter(Boolean);
          g.urls = [...new Set([...g.urls, ...lines])];
          el.value = '';
        }
      });
      renderGroups();
    }

    function renderPathsAndTpls() {
      let filesHtml = `
        <div class="url-row" style="margin-bottom:15px; background:rgba(0,255,65,0.05); padding:10px;">
          <span style="width:70px; font-weight:bold;">[全局总集]</span>
          <input value="${config.global.filename}" onchange="config.global.filename=this.value.replace(/[^a-zA-Z0-9_-\\u4e00-\\u9fa5]/g,'')">
          <span style="margin:0 10px">.txt</span>
          <select style="width:150px; margin:0;" onchange="config.global.tid=this.value">
            ${config.templates.map(t => `<option value="${t.id}" ${t.id === config.global.tid ? 'selected' : ''}>${t.name}</option>`).join('')}
          </select>
        </div>
      `;

      filesHtml += config.groups.map((g, i) => `
        <div class="url-row" style="margin-bottom:10px; padding:0 10px;">
          <span style="width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">[${g.name}]</span>
          <input value="${g.filename}" onchange="config.groups[${i}].filename=this.value.replace(/[^a-zA-Z0-9_-\\u4e00-\\u9fa5]/g,'')">
          <span style="margin:0 10px">.txt</span>
          <select style="width:150px; margin:0;" onchange="config.groups[${i}].tid=this.value">
            ${config.templates.map(t => `<option value="${t.id}" ${t.id === g.tid ? 'selected' : ''}>${t.name}</option>`).join('')}
          </select>
        </div>
      `).join('');
      
      document.getElementById('file-config-list').innerHTML = filesHtml;

      const tplHtml = config.templates.map((t, i) => `
        <details open>
          <summary>
            <span><input value="${t.name}" onchange="config.templates[${i}].name=this.value; renderPathsAndTpls()" style="width:120px; border:none; border-bottom:1px solid var(--c); background:none; padding:2px; margin:0"></span>
            <span class="del-btn" onclick="config.templates.splice(${i},1); renderPathsAndTpls();">✖ 删除</span>
          </summary>
          <div class="group-body">
            <div style="margin-bottom:10px;">
              ${t.fmt.map((fk, fi) => `
                <span class="tk-tag">
                  ${fk.startsWith('txt:') ? '文字: ' + fk.substring(4) : tkNameMap[fk]}
                  <span class="tk-del" onclick="config.templates[${i}].fmt.splice(${fi},1); renderPathsAndTpls()">✖</span>
                </span>
              `).join('')}
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:5px;">
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="config.templates[${i}].fmt.push('ip_domain'); renderPathsAndTpls()">+ IP/域名</button>
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="config.templates[${i}].fmt.push('original'); renderPathsAndTpls()">+ 原始名称</button>
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="config.templates[${i}].fmt.push('space'); renderPathsAndTpls()">+ 空格</button>
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="config.templates[${i}].fmt.push('inc'); renderPathsAndTpls()">+ 递增</button>
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="config.templates[${i}].fmt.push('inc01'); renderPathsAndTpls()">+ 递增01</button>
              <button class="btn" style="padding:4px 8px; font-size:11px" onclick="promptUI('输入自定义文字', v => { if(v){ config.templates[${i}].fmt.push('txt:'+v); renderPathsAndTpls(); } })">+ 自定义文字</button>
            </div>
          </div>
        </details>
      `).join('');
      document.getElementById('tpl-list').innerHTML = tplHtml || '<div style="opacity:0.5">暂无模板</div>';
    }

    function addTpl() {
      config.templates.push({ id: 't' + Date.now(), name: '新模板', fmt: ['original'] });
      renderPathsAndTpls();
    }

    function renderLinks() {
      const repo = getAutoRepo();
      if (!repo) return document.getElementById('api-links').innerHTML = '环境验证失败，无法映射网络链路';
      
      const maxUrl = `https://raw.githubusercontent.com/${repo}/main/api/${config.global.filename}.txt`;
      let html = `<div style="margin-bottom:5px;">[全局] 总订阅聚合</div><div class="copy-box" onclick="navigator.clipboard.writeText('${maxUrl}'); toast('链接已复制')">${maxUrl}</div>`;

      html += config.groups.map(g => {
        const url = `https://raw.githubusercontent.com/${repo}/main/api/${g.filename}.txt`;
        return `<div style="margin-bottom:5px; margin-top:15px">[分组] ${g.name}</div><div class="copy-box" onclick="navigator.clipboard.writeText('${url}'); toast('链接已复制')">${url}</div>`;
      }).join('');
      
      document.getElementById('api-links').innerHTML = html;
    }
  </script>
</body>
</html>
