<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>聚合终端 - 控制中心</title>
  <style>
    :root { --c: #00ff41; --b: #0a0a0a; }
    * { -webkit-tap-highlight-color: transparent!important; outline: none!important; box-sizing: border-box; }
    body { background: var(--b); color: var(--c); font-family: 'Courier New', monospace; margin: 0; padding-top: 20px; padding-bottom: 60px; font-size: 12px; }
    body::after { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.02) 2px,rgba(0,255,65,0.02) 4px); pointer-events:none; z-index:998; }
    .container { padding: 20px; max-width: 800px; margin: 0 auto; position: relative; z-index: 10; }
    
    #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--b); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    #login-screen input { width: 300px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,65,0.3); color: var(--c); padding: 15px; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
    #login-screen button { width: 300px; background: transparent; color: var(--c); border: 1px solid var(--c); padding: 15px; cursor: pointer; letter-spacing: 4px; }
    #login-screen button:hover { background: rgba(0,255,65,0.2); }
    
    .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #000; border-top: 1px solid rgba(0,255,65,0.3); display: flex; align-items: center; z-index: 1000; }
    .ni { flex: 1; text-align: center; cursor: pointer; opacity: 0.6; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(0,255,65,0.3); }
    .ni:last-child { border-right: none; }
    .ni.active { opacity: 1; font-weight: bold; background: rgba(0,255,65,0.1); }
    
    input, textarea, select { width: 100%; background: #000; border: 1px solid var(--c); color: var(--c); padding: 8px; margin-bottom: 10px; font-family: monospace; }
    textarea.add-api { height: 100px; resize: vertical; }
    .btn { border: 1px solid var(--c); padding: 8px 15px; color: var(--c); background: none; cursor: pointer; display: inline-block; transition: 0.2s; }
    .btn:hover { background: rgba(0,255,65,0.2); }
    .btn-main { background: rgba(0,255,65,0.1); font-weight: bold; }
    
    details { border: 1px solid var(--c); margin-bottom: 10px; background: rgba(0,255,65,0.02); }
    summary { padding: 10px; cursor: pointer; border-bottom: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
    details[open] summary { border-bottom: 1px solid var(--c); margin-bottom: 10px; }
    .group-body { padding: 0 10px 10px 10px; }
    
    .del-btn { color: rgba(0,255,65,0.5); cursor: pointer; }
    .del-btn:hover { color: #ff4444; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: var(--c); border: 1px solid var(--c); padding: 10px 20px; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; }
    .copy-box { border: 1px dashed var(--c); padding: 10px; margin-bottom: 15px; cursor: pointer; word-break: break-all; background: rgba(0,255,65,0.02); }
    .fab-br { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    
    .url-row { display: flex; align-items: center; margin-bottom: 5px; gap: 5px; }
    .url-row input { margin: 0; flex: 1; }
  </style>
</head>
<body>
  <canvas id="cvs" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.4;pointer-events:none;"></canvas>
  <div id="toast" class="toast"></div>

  <div id="login-screen">
    <div style="font-size:20px; margin-bottom:30px; letter-spacing: 5px; text-shadow: 0 0 10px rgba(0,255,65,0.5);">[ 核 心 终 端 ]</div>
    <input type="password" id="login-token" placeholder="> 输入 GitHub TOKEN 验证身份 _">
    <button onclick="loginWithToken()">[ 接 入 系 统 ]</button>
  </div>

  <div id="main-app" style="display:none;">
    <div class="container" id="ta">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> API 源节点池</div>
      <div id="group-list"></div>
      <div class="fab-br">
        <button class="btn" onclick="addGroup()">新增分组</button>
        <button class="btn btn-main" onclick="saveToGitHub()">同步并构建</button>
      </div>
    </div>

    <div class="container" id="tc" style="display:none;">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> 订阅分发配置</div>
      <div id="path-list"></div>
      <div class="fab-br">
        <button class="btn" onclick="addPath()">新增路径</button>
        <button class="btn btn-main" onclick="saveToGitHub()">同步并构建</button>
      </div>
    </div>

    <div class="container" id="tl" style="display:none;">
      <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid var(--c); padding-bottom:5px;">>>> 客户端分发链接 (点击复制)</div>
      <div id="api-links"></div>
      <div style="margin-top:20px; font-size:11px; opacity:0.6;">* 数据同步后，云端 Actions 约需 1 分钟完成最新节点的抓取与静态发布。</div>
    </div>

    <nav class="nav">
      <div class="ni active" id="n-a" onclick="switchTab('a')">[ API池 ]</div>
      <div class="ni" id="n-c" onclick="switchTab('c')">[ API配置 ]</div>
      <div class="ni" id="n-l" onclick="switchTab('l')">[ API列表 ]</div>
    </nav>
  </div>

  <script>
    const c=document.getElementById('cvs'),ctx=c.getContext('2d');
    let w=c.width=window.innerWidth,h=c.height=window.innerHeight,pts=[];
    window.onresize=()=>{w=c.width=window.innerWidth;h=c.height=window.innerHeight;};
    for(let i=0;i<50;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*0.5,vy:(Math.random()-.5)*0.5});
    function d(){
      ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,255,65,0.5)';ctx.strokeStyle='rgba(0,255,65,0.1)';
      for(let i=0;i<pts.length;i++){
        let p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
        ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();
      }
      requestAnimationFrame(d);
    }
    d();

    let config = { groups: [], paths: [] };
    let fileSha = '';
    let currentToken = '';

    function toast(msg) {
      const el = document.getElementById('toast');
      el.innerText = msg; el.style.opacity = 1;
      setTimeout(() => el.style.opacity = 0, 2500);
    }

    function getAutoRepo() {
      const host = window.location.hostname;
      const path = window.location.pathname;
      if (host.includes('github.io')) {
        return `${host.split('.')[0]}/${path.split('/')[1] || ''}`.replace(/\/$/, '');
      }
      return null;
    }

    async function loginWithToken() {
      const tokenInput = document.getElementById('login-token').value.trim();
      const repo = getAutoRepo();
      
      if (!repo) {
        toast('仅支持在 GitHub Pages 环境下运行');
        return;
      }
      if (!tokenInput) {
        toast('> 错误：凭证不可为空');
        return;
      }

      document.getElementById('login-token').value = '正在验证密钥权限...';
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
          headers: { 'Authorization': `token ${tokenInput}` }
        });
        
        if (!res.ok) throw new Error(res.status);
        
        const data = await res.json();
        fileSha = data.sha;
        config = JSON.parse(decodeURIComponent(escape(atob(data.content))));
        if(!config.groups) config.groups = [];
        if(!config.paths) config.paths = [];
        
        currentToken = tokenInput; 
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        renderGroups();
        renderPaths();
        toast('接入成功');
      } catch (e) {
        document.getElementById('login-token').value = '';
        toast('> 错误：密钥无效或无读取权限');
      }
    }

    function switchTab(x) {
      ['a','c','l'].forEach(id => {
        document.getElementById(`t${id}`).style.display = (x===id) ? 'block' : 'none';
        document.getElementById(`n-${id}`).classList.toggle('active', x===id);
      });
      if (x === 'l') renderLinks();
    }

    async function saveToGitHub() {
      flushInputs();
      const repo = getAutoRepo();
      if (!repo || !currentToken || !fileSha) { toast('环境错误，无法构建'); return; }

      toast('正在同步并触发云端构建...');
      try {
        const contentStr = JSON.stringify(config, null, 2);
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${currentToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: "Update routing config via Terminal",
            content: btoa(unescape(encodeURIComponent(contentStr))),
            sha: fileSha
          })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        fileSha = data.content.sha;
        toast('数据已写入！Actions 构建任务已启动');
      } catch (e) {
        toast('同步失败，请检查网络或权限');
      }
    }

    function renderGroups() {
      const html = config.groups.map((g, i) => `
        <details open>
          <summary>
            <span>[源] <input value="${g.name}" onchange="config.groups[${i}].name=this.value" style="width:120px; border:none; border-bottom:1px solid var(--c); background:none; padding:2px; margin:0"></span>
            <span class="del-btn" onclick="config.groups.splice(${i},1); renderGroups(); renderPaths();">✖ 删除</span>
          </summary>
          <div class="group-body">
            <textarea class="add-api" id="add-api-${i}" placeholder="录入 API 链接或纯节点，按行分割"></textarea>
            ${g.urls.map((u, ui) => `
              <div class="url-row">
                <input value="${u}" onchange="config.groups[${i}].urls[${ui}]=this.value">
                <span class="del-btn" onclick="config.groups[${i}].urls.splice(${ui},1); renderGroups()">✖</span>
              </div>
            `).join('')}
          </div>
        </details>
      `).join('');
      document.getElementById('group-list').innerHTML = html || '<div style="opacity:0.5">尚未配置节点源</div>';
    }

    function addGroup() {
      const id = 'g' + Date.now();
      config.groups.push({ id, name: '未命名分组', urls: [] });
      renderGroups(); renderPaths();
    }

    function flushInputs() {
      config.groups.forEach((g, i) => {
        const el = document.getElementById('add-api-' + i);
        if (el && el.value.trim()) {
          const lines = el.value.split('\n').map(l=>l.trim()).filter(Boolean);
          g.urls = [...new Set([...g.urls, ...lines])];
          el.value = '';
        }
      });
      renderGroups();
    }

    function renderPaths() {
      const groupOptions = `<option value="all">混合全部分组 (All)</option>` + 
        config.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

      const html = config.paths.map((p, i) => {
        const selectedHTML = (p.groupIds || []).map(gid => {
          let gname = gid === 'all' ? '全部分组' : (config.groups.find(x => x.id === gid)?.name || '无效来源');
          return `<span style="background:rgba(0,255,65,0.1); padding:2px 8px; margin-right:5px; border:1px solid var(--c); font-size:11px;">${gname} <span style="cursor:pointer" onclick="config.paths[${i}].groupIds=config.paths[${i}].groupIds.filter(x=>x!=='${gid}'); renderPaths()">✖</span></span>`;
        }).join('');

        return `
        <details open>
          <summary>
            <span>[线] <input value="${p.name}" onchange="config.paths[${i}].name=this.value" style="width:120px; border:none; border-bottom:1px solid var(--c); background:none; padding:2px; margin:0"></span>
            <span class="del-btn" onclick="config.paths.splice(${i},1); renderPaths()">✖ 删除</span>
          </summary>
          <div class="group-body">
            <label>指向文件名 (系统自动补充 .txt)</label>
            <input value="${p.path}" onchange="config.paths[${i}].path=this.value.replace(/[^a-zA-Z0-9_-]/g,'')">
            <label>源数据绑定</label>
            <div style="margin-bottom:10px">${selectedHTML || '<span style="opacity:0.5;font-size:11px">暂无绑定记录</span>'}</div>
            <select onchange="if(this.value){ if(!config.paths[${i}].groupIds) config.paths[${i}].groupIds=[]; if(!config.paths[${i}].groupIds.includes(this.value)) config.paths[${i}].groupIds.push(this.value); this.value=''; renderPaths(); }">
              <option value="">+ 新增数据源节点流</option>
              ${groupOptions}
            </select>
          </div>
        </details>`;
      }).join('');
      document.getElementById('path-list').innerHTML = html || '<div style="opacity:0.5">尚未配置文件路由</div>';
    }

    function addPath() {
      const id = 'p' + Date.now();
      config.paths.push({ id, name: '新建分发链路', path: 'route_' + Math.floor(Math.random()*1000), groupIds: [] });
      renderPaths();
    }

    function renderLinks() {
      const repo = getAutoRepo();
      if (!repo) {
        document.getElementById('api-links').innerHTML = '环境验证失败，无法映射网络链路';
        return;
      }
      const html = config.paths.map(p => {
        const filename = p.path.endsWith('.txt') ? p.path : `${p.path}.txt`;
        const url = `https://raw.githubusercontent.com/${repo}/main/output/${filename}`;
        return `
          <div style="margin-bottom:5px;">${p.name} (/${filename})</div>
          <div class="copy-box" onclick="navigator.clipboard.writeText('${url}'); toast('链接已复制到剪贴板')">${url}</div>
        `;
      }).join('');
      document.getElementById('api-links').innerHTML = html || '链路记录为空';
    }
  </script>
</body>
</html>
