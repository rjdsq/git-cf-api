name: 优选采集
run-name: ${{ github.event.action || '优选采集' }}

on:
  workflow_dispatch:
  repository_dispatch:
    types: [优选采集-自动执行]
  schedule:
    - cron: '5,25,45 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 环境配置
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 执行采集与对账
        run: |
          python cf.090227.xyz.py || true
          python vps789.com.py || true
          python cf-speed-dns.py || true
          python max.py

      - name: 推送更新
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --staged --quiet; then
            echo "没有数据变化，跳过提交"
          else
            git commit -m "更新时间 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
